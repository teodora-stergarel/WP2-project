<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Create Offer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">
          <h2 class="text-center mb-4">Create a Tutoring Offer</h2>

          <form th:action="@{/offers/create}" th:object="${offer}" method="post">
            <div class="mb-3">
              <label for="title" class="form-label fw-bold">Title</label>
              <input type="text" id="title" th:field="*{title}" class="form-control" placeholder="Enter offer title" required>
            </div>

            <div class="mb-3">
              <label for="description" class="form-label fw-bold">Description</label>
              <textarea id="description" th:field="*{description}" class="form-control" rows="4" placeholder="Describe your tutoring offer" required></textarea>
            </div>

            <div class="mb-4">
              <label for="priceCredits" class="form-label fw-bold">Price (Credits)</label>
              <input type="number" id="priceCredits" th:field="*{priceCredits}" class="form-control" min="1" max="5" placeholder="1 to 5 credits" required>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Create Offer</button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
