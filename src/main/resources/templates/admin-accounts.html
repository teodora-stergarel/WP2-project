<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Accounts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #efefdf;
            font-family: Georgia, serif;
        }

        .topbar {
            background: linear-gradient(90deg, #6a00b9, #7a00c9);
            color: white;
            padding: 18px 28px;
            border-radius: 0 0 18px 18px;
            margin-bottom: 40px;
        }

        .table-container {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        h2 {
            color: #5b00b5;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .btn-remove {
            background-color: #dc3545;
            color: white;
            border-radius: 12px;
            border: none;
            padding: 8px 14px;
            font-weight: 600;
        }

        .btn-remove:hover {
            background-color: #bb2d3b;
        }

        .admin-badge {
            background-color: #d8b4fe;
            color: #5b21b6;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }

        .protected-badge {
            background-color: #e5e7eb;
            color: #374151;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container py-4">

    <div class="topbar d-flex justify-content-between align-items-center">
        <h1 class="h3 m-0">Admin Accounts Management</h1>
        <a th:href="@{/admin}" class="btn btn-light">Back to Dashboard</a>
    </div>

    <div class="table-container">
        <h2>All Registered Users</h2>

        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Credits</th>
                <th>Penalties</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.name}">Name</td>
                <td th:text="${user.email}">Email</td>
                <td th:text="${user.creditsBalance}">0</td>
                <td th:text="${user.penalties}">0</td>

                <td>
                    <span th:if="${user.role.name() == 'ADMIN'}"
                          class="admin-badge">
                        ADMIN
                    </span>

                    <span th:if="${user.role.name() == 'USER'}">
                        USER
                    </span>
                </td>

                <td>
                    <div th:if="${user.role.name() == 'ADMIN' || user.email == currentAdminEmail}">
                        <span class="protected-badge">Protected</span>
                    </div>

                    <form th:if="${user.role.name() != 'ADMIN' && user.email != currentAdminEmail}"
                          th:action="@{/admin/accounts/delete/{id}(id=${user.id})}"
                          method="post"
                          style="display:inline;">

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>

                        <button type="submit"
                                class="btn-remove"
                                onclick="return confirm('Are you sure you want to remove this user?');">
                            Remove
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>

        </table>
    </div>

</div>

</body>
</html>
