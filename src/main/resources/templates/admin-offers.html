<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Manage Offers</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #efefdf;
            font-family: Georgia, serif;
        }

        .header {
            background: linear-gradient(90deg, #6a00b9, #7a00c9);
            color: white;
            padding: 20px 30px;
            border-radius: 0 0 20px 20px;
        }

        .offer-card {
            border-radius: 20px;
            padding: 20px;
            background: white;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .offer-title {
            font-weight: bold;
            font-size: 1.2rem;
        }

        .price {
            color: #6a00b9;
            font-weight: bold;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            border-radius: 12px;
        }

        .btn-delete:hover {
            background-color: #bb2d3b;
        }

        .btn-back {
            background-color: white;
            color: #6a00b9;
            font-weight: bold;
            border-radius: 12px;
        }

        .btn-back:hover {
            background-color: #eee;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header d-flex justify-content-between align-items-center mt-3">
        <h2>Manage Offers</h2>
        <a th:href="@{/admin}" class="btn btn-back">Back to Dashboard</a>
    </div>

    <!-- OFFERS GRID -->
    <div class="row mt-4 g-4">

        <div class="col-md-4" th:each="offer : ${offers}">
            <div class="offer-card">

                <div>
                    <div class="offer-title" th:text="${offer.title}">Title</div>

                    <p class="text-muted mt-2"
                       th:text="${#strings.abbreviate(offer.description, 120)}">
                    </p>

                    <p class="price">
                        <span th:text="${offer.priceCredits}"></span> credits
                    </p>

                    <p class="text-muted">
                        Owner: <span th:text="${offer.owner.name}"></span>
                    </p>
                </div>

                <!-- ACTIONS -->
                <div class="d-flex justify-content-between mt-3">

                    <a th:href="@{'/admin/offers/delete/' + ${offer.id}}"
                       class="btn btn-delete btn-sm"
                       onclick="return confirm('Are you sure you want to delete this offer?');">
                        Delete
                    </a>

                </div>

            </div>
        </div>

    </div>

</div>

</body>
</html>
