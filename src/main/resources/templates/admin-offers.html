<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - All Offers</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #efefdf;
            font-family: Georgia, serif;
        }

        .header {
            background: linear-gradient(90deg, #6a00b9, #7a00c9);
            color: white;
            padding: 20px 30px;
            border-radius: 0 0 20px 20px;
        }

        .btn-back {
            background-color: #d8b4fe;
            color: #5b21b6;
            font-weight: bold;
            border-radius: 18px;
            border: none;
            padding: 10px 18px;
        }

        .btn-back:hover {
            background-color: #c084fc;
            color: #4c1d95;
        }

        .offer-link {
            text-decoration: none;
            color: inherit;
            display: block;
            height: 100%;
        }

        .offer-card {
            border: 4px solid #6a00b9;
            border-radius: 24px;
            padding: 18px;
            background: transparent;
            min-height: 230px;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .offer-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(106, 0, 185, 0.15);
        }

        .offer-badge {
            display: inline-block;
            background-color: #d8b4fe;
            color: #5b21b6;
            border-radius: 18px;
            padding: 6px 18px;
            font-size: 1.1rem;
            margin-bottom: 18px;
            width: fit-content;
        }

        .offer-description {
            color: #333;
            font-size: 0.95rem;
            line-height: 1.4;
            min-height: 95px;
        }

        .owner-badge {
            align-self: flex-end;
            background-color: #6a00b9;
            color: white;
            border-radius: 16px;
            padding: 4px 12px;
            font-size: 0.85rem;
            font-weight: bold;
            width: fit-content;
        }
    </style>
</head>
<body>

<div class="container-fluid px-4 px-md-5 pb-5">

    <div class="header d-flex justify-content-between align-items-center mt-3">
        <h2 class="m-0">All offers</h2>
        <a th:href="@{/admin}" class="btn btn-back">Back to Dashboard</a>
    </div>

    <div class="row mt-4 g-4">

        <div class="col-md-6 col-lg-4 col-xl-3" th:each="offer : ${offers}">
            <a th:href="@{'/admin/offers/' + ${offer.id}}" class="offer-link">
                <div class="offer-card">

                    <div>
                        <div class="offer-badge" th:text="${offer.title}">Programming</div>

                        <div class="offer-description"
                             th:text="${#strings.abbreviate(offer.description, 140)}">
                            Offer description
                        </div>
                    </div>

                    <div class="owner-badge"
                         th:text="'@' + ${offer.owner.name}">
                        @Owner
                    </div>

                </div>
            </a>
        </div>

    </div>

</div>

</body>
</html>
