<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Offers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Available Tutoring Offers</h2>
        <a href="/offers/create" class="btn btn-primary">Create New Offer</a>
    </div>

    <div th:if="${param.success}" class="alert alert-success">
        Lesson requested successfully.
    </div>

    <div th:if="${param.error}" class="alert alert-danger">
        Not enough credits.
    </div>

    <div th:if="${#lists.isEmpty(offers)}" class="alert alert-info">
        No offers available yet.
    </div>

    <div class="row" th:if="${!#lists.isEmpty(offers)}">

        <div class="col-md-6 mb-4" th:each="offer : ${offers}">
            <div class="card h-100 shadow-sm border-0 rounded-4">

                <div class="card-body">

                    <h5 class="card-title" th:text="${offer.title}"></h5>

                    <p class="card-text"
                       th:text="${#strings.abbreviate(offer.description, 120)}">
                    </p>

                    <p class="mb-2">
                        <strong>Price:</strong>
                        <span class="badge bg-success"
                              th:text="${offer.priceCredits} + ' credits'"></span>
                    </p>

                    <p class="mb-2">
                        <strong>Created by:</strong>
                        <span th:text="${offer.owner.name}"></span>
                    </p>

                    <p class="text-muted small mb-3">
                        <strong>Created at:</strong>
                        <span th:text="${#temporals.format(offer.createdAt, 'dd MMM yyyy, HH:mm')}"></span>
                    </p>

                    <form th:action="@{/offers/delete/{id}(id=${offer.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-danger w-100">
                            Delete Offer
                        </button>
                    </form>

                    <form th:action="@{/offers/request/{id}(id=${offer.id})}" method="post" class="mt-2">
                        <button type="submit" class="btn btn-sm btn-success w-100">
                            Request Lesson
                        </button>
                    </form>



                </div>

            </div>
        </div>

    </div>

</div>


</body>
</html>
