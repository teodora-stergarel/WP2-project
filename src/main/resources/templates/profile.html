<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">

                    <div class="text-center mb-4">
                        <img th:if="${user.profileImagePath != null}"
                             th:src="${user.profileImagePath}"
                             alt="Profile Image"
                             class="rounded-circle border shadow-sm"
                             style="width: 120px; height: 120px; object-fit: cover;">

                        <div th:if="${user.profileImagePath == null}"
                             class="rounded-circle bg-primary text-white d-inline-flex justify-content-center align-items-center shadow-sm"
                             style="width: 120px; height: 120px; font-size: 42px;">
                            U
                        </div>
                    </div>

                    <h2 class="text-center mb-4">My Profile</h2>

                    <div th:if="${param.success}" class="alert alert-success">
                        Bio updated successfully.
                    </div>

                    <div th:if="${param.imageSuccess}" class="alert alert-success">
                        Profile picture updated successfully.
                    </div>

                    <h5 class="mb-3">Account Information</h5>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Name</label>
                        <div class="form-control bg-white" th:text="${user.name}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <div class="form-control bg-white" th:text="${user.email}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Role</label><br>
                        <span class="badge bg-dark px-3 py-2" th:text="${user.role}"></span>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Credits</label><br>
                        <span class="badge bg-success fs-6 px-3 py-2" th:text="${user.creditsBalance} + ' credits'"></span>
                    </div>

                    <hr class="my-4">

                    <h5 class="mb-3">Change Profile Picture</h5>

                    <form th:action="@{/profile/upload-image}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label for="image" class="form-label">Select a new profile picture</label>
                            <input id="image" type="file" name="image" class="form-control" accept="image/*">
                        </div>
                        <div class="d-grid mb-4">
                            <button type="submit" class="btn btn-outline-secondary">Change Profile Picture</button>
                        </div>
                    </form>

                    <hr class="my-4">

                    <h5 class="mb-3">Update Bio</h5>

                    <form th:action="@{/profile/update-bio}" method="post">
                        <div class="mb-3">
                            <label for="bio" class="form-label fw-bold">Bio</label>
                            <textarea
                                    id="bio"
                                    name="bio"
                                    class="form-control"
                                    rows="4"
                                    placeholder="Write something about yourself..."
                                    th:text="${user.bio}"></textarea>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Update Bio</button>
                        </div>
                    </form>

                    <div class="mt-4">
                        <h5>Current Bio</h5>
                        <div class="p-3 bg-white border rounded"
                             th:text="${user.bio != null and !#strings.isEmpty(user.bio) ? user.bio : 'No bio added yet.'}">
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
