<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #efefdf;
            font-family: Georgia, serif;
        }

        .topbar {
            background: linear-gradient(90deg, #6a00b9, #7a00c9);
            color: white;
            padding: 18px 28px;
            border-radius: 0 0 18px 18px;
        }

        .admin-badge {
            background-color: #d8b4fe;
            color: #5b21b6;
            border-radius: 20px;
            padding: 10px 18px;
            font-weight: 600;
            display: inline-block;
        }

        .welcome-title {
            color: #5b00b5;
            font-size: 3rem;
            font-weight: 500;
            line-height: 1;
        }

        .welcome-subtitle {
            color: #5b00b5;
            font-size: 1.5rem;
        }

        .stat-card {
            background: linear-gradient(135deg, #a855f7, #9333ea);
            border-radius: 22px;
            color: #fff6b0;
            min-height: 140px;
            box-shadow: 0 4px 0 #c026d3, 0 8px 20px rgba(128, 0, 128, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .stat-card .big-number {
            font-size: 2rem;
            display: block;
            margin-bottom: 8px;
        }

        .overview-box {
            background-color: rgba(255,255,255,0.25);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.05);
        }

        .overview-header {
            font-size: 2rem;
            font-weight: 700;
            color: #5b00b5;
            padding: 18px 24px 10px 24px;
        }

        .overview-row {
            border-top: 1px solid rgba(0,0,0,0.08);
            padding: 18px 24px;
            font-size: 1.2rem;
        }

        .overview-label {
            color: #6a00b9;
            font-weight: 700;
        }

        .overview-value {
            color: #6a00b9;
            font-weight: 700;
            font-size: 1.7rem;
        }

        .nav-buttons .btn {
            border-radius: 16px;
            font-weight: 600;
            padding: 12px 18px;
        }

        .btn-purple {
            background-color: #7a00c9;
            color: white;
            border: none;
        }

        .btn-purple:hover {
            background-color: #6800aa;
            color: white;
        }

        .btn-soft {
            background-color: #d8b4fe;
            color: #5b21b6;
            border: none;
        }

        .btn-soft:hover {
            background-color: #c084fc;
            color: #4c1d95;
        }
    </style>
</head>
<body>

<div class="container-fluid px-4 px-md-5 pb-5">

    <div class="topbar d-flex justify-content-between align-items-center mt-3">
        <h1 class="h2 m-0">Admin Dashboard</h1>
        <div class="admin-badge" th:text="${adminName}">Admin</div>
    </div>

    <div class="mt-5">
        <div class="welcome-title">Welcome back!</div>
        <div class="welcome-subtitle">Here is what happened while you were away:</div>
    </div>

    <div class="row g-4 mt-3">
        <div class="col-md-6">
            <div class="stat-card">
                <div>
                    <span class="big-number" th:text="${userCount}">0</span>
                    Active students
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="stat-card">
                <div>
                    <span class="big-number" th:text="${offerCount}">0</span>
                    Tutoring offers
                </div>
            </div>
        </div>
    </div>

    <div class="overview-box mt-5">
        <div class="overview-header">This Week Overview</div>

        <div class="overview-row d-flex justify-content-between align-items-center">
            <div class="overview-label">Credits Swapped</div>
            <div class="overview-value" th:text="'+' + ${creditsSwapped}">+0</div>
        </div>

        <div class="overview-row d-flex justify-content-between align-items-center">
            <div class="overview-label">New Offers</div>
            <div class="overview-value" th:text="'+' + ${newOffers}">+0</div>
        </div>

        <div class="overview-row d-flex justify-content-between align-items-center">
            <div class="overview-label">New Users</div>
            <div class="overview-value" th:text="'+' + ${newUsers}">+0</div>
        </div>

        <div class="overview-row d-flex justify-content-between align-items-center">
            <div class="overview-label">Top Teacher</div>
            <div class="overview-value" th:text="${topTeacher}">N/A</div>
        </div>
    </div>

    <div class="row g-3 mt-4 nav-buttons">
        <div class="col-md-3">
            <a th:href="@{/admin/offers}" class="btn btn-purple w-100">Manage Offers</a>
        </div>
        <div class="col-md-3">
            <a th:href="@{/admin/accounts}" class="btn btn-soft w-100">Manage Accounts</a>
        </div>
        <div class="col-md-3">
            <a th:href="@{/profile}" class="btn btn-outline-dark w-100">Back to Profile</a>
        </div>
        <div class="col-md-3">
            <a th:href="@{/logout}" class="btn btn-danger w-100">Logout</a>
        </div>
    </div>

</div>

</body>
</html>
